# Perfil para MySQL 5.5 legado.
# Ative com: -Dspring.profiles.active=mysql55
#
# ObservańŃo: Flyway 8.x nŃo suporta MySQL 5.5, este perfil desativa migrations e usa Hibernate para criar/atualizar a tabela localmente.
spring.datasource.url=jdbc:mysql://localhost:3306/taskmanager?createDatabaseIfNotExist=true&useSSL=false
spring.datasource.username=root
spring.datasource.password=admin
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.flyway.enabled=false
spring.jpa.generate-ddl=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQL5Dialect
spring.h2.console.enabled=false
# Setar true caso tenha necessidade de exibir o sql do Hibernate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
